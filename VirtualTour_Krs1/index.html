<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Tour — Thorstorp, 1. krs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; font-family: Arial, sans-serif; }
    #panorama { width: 100vw; height: 100vh; }
    #position-list {
      position: fixed; top: 10px; right: 10px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: white; padding: 10px;
      border-radius: 6px; max-height: 90vh; overflow-y: auto; font-size: 13px;
    }
    #position-list h3 { margin-bottom: 8px; font-size: 14px; color: #ccc; }
    .pos-btn {
      display: block; width: 100%; text-align: left; padding: 5px 8px;
      background: transparent; border: 1px solid #444; color: #ddd;
      cursor: pointer; border-radius: 3px; margin-bottom: 3px;
    }
    .pos-btn:hover { background: rgba(255,255,255,0.15); }
    .pos-btn.active { background: rgba(255,255,255,0.25); border-color: #aaa; }
    #home-btn {
      position: fixed; bottom: 24px; left: 24px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: white; border: 1px solid #555;
      border-radius: 50%; width: 48px; height: 48px; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #home-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>

  <div id="panorama"></div>
  <button id="home-btn" onclick="resetToStart()" title="Back to start">⌂</button>
  <div id="position-list">

    <button class="pos-btn" onclick="goTo('scene_003')" id="btn_003">Scenen / Esiintymislava</button>
    <button class="pos-btn" onclick="goTo('scene_004')" id="btn_004">Lilla Salen / Pieni Sali</button>
    <button class="pos-btn" onclick="goTo('scene_005')" id="btn_005">Köket / Keittiö</button>
    <button class="pos-btn" onclick="goTo('scene_006')" id="btn_006">Hjälpköket / Apukeittiö</button>
    <button class="pos-btn" onclick="goTo('scene_007')" id="btn_007">WC-tambur / WC-etutila</button>

    const viewer = pannellum.viewer('panorama', config);

    function goTo(sceneId) {
      viewer.loadScene(sceneId);
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      const idx = sceneId.replace('scene_', '');
      const btn = document.getElementById('btn_' + idx);
      if (btn) btn.classList.add('active');
    }

    // Resize hotspot arrows by distance after Pannellum has placed them
    function scaleHotspots() {
      document.querySelectorAll('.pnlm-scene').forEach(el => {
        const tip = el.querySelector('.pnlm-tooltip');
        if (!tip) return;
        const m = tip.textContent.match(/([\d.]+)\s*m/);
        if (!m) return;
        const dist = parseFloat(m[1]);
        const size   = dist < 3 ? 40 : dist < 7 ? 28 : 20;
        const offset = -(size / 2);
        el.style.width      = size   + 'px';
        el.style.height     = size   + 'px';
        el.style.marginTop  = offset + 'px';
        el.style.marginLeft = offset + 'px';
      });
    }
    viewer.on('load',        scaleHotspots);
    viewer.on('scenechange', () => setTimeout(scaleHotspots, 50));

    function resetToStart() {
      viewer.loadScene('scene_000');
      viewer.setPitch(0);
      viewer.setYaw(0);
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn_000').classList.add('active');
    }

    viewer.on('scenechange', (sceneId) => {
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      const idx = sceneId.replace('scene_', '');
      const btn = document.getElementById('btn_' + idx);
      if (btn) btn.classList.add('active');
    });

    // Highlight first button
    document.getElementById('btn_000').classList.add('active');
